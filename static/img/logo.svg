<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Infinity symbol drawn as a single smooth path -->
  <path d="M 50,32
           C 50,20 42,12 32,12
           C 22,12 14,20 14,32
           C 14,44 22,52 32,52
           C 42,52 54,40 62,32
           C 70,24 82,12 92,12
           C 102,12 110,20 110,32
           C 110,44 102,52 92,52
           C 82,52 70,40 62,32
           C 54,24 42,20 32,20
           Z"
        fill="none"
        stroke="url(#g1)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- "An" in blue, "finit" with infinity color -->
  <text x="128" y="40"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="30"
        font-weight="800"
        letter-spacing="0.5">
    <tspan fill="#1e3a8a">An</tspan><tspan fill="#2563eb">finit</tspan>
  </text>

  <!-- Small tagline -->
  <text x="129" y="54"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="9"
        font-weight="500"
        fill="#94a3b8"
        letter-spacing="2.5">FINANCIAL ADVISOR</text>
</svg>
