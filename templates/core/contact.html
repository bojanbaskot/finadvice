{% extends "base.html" %}
{% block title %}Kontakt - {{ site_settings.site_name }}{% endblock %}
{% block content %}
<div class="container py-5">
  <h1 class="h2 fw-bold mb-4">Kontakt</h1>
  {% if site_settings.contact_email %}<p><i class="bi bi-envelope me-2"></i>{{ site_settings.contact_email }}</p>{% endif %}
  {% if site_settings.phone %}<p><i class="bi bi-telephone me-2"></i>{{ site_settings.phone }}</p>{% endif %}
</div>
{% endblock %}
