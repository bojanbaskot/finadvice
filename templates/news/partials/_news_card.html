<div class="card border-0 shadow-sm h-100">
  {% if article.cover_image %}
  <img src="{{ article.cover_image.url }}" class="card-img-top" alt="{{ article.title }}" style="height:180px;object-fit:cover;">
  {% else %}
  <div class="bg-light d-flex align-items-center justify-content-center" style="height:180px;"><i class="bi bi-newspaper text-muted fs-1"></i></div>
  {% endif %}
  <div class="card-body d-flex flex-column">
    <span class="badge bg-primary mb-2">{{ article.category.name }}</span>
    <h6 class="card-title"><a href="{{ article.get_absolute_url }}" class="text-decoration-none text-dark">{{ article.title }}</a></h6>
    <p class="card-text text-muted small flex-grow-1">{{ article.excerpt|truncatewords:20 }}</p>
    <div class="d-flex justify-content-between align-items-center mt-2">
      <small class="text-muted">{{ article.published_at|date:"d.m.Y" }}</small>
      <small class="text-muted"><i class="bi bi-eye me-1"></i>{{ article.views_count }}</small>
    </div>
  </div>
</div>
